<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Facade Pattern</title><link rel="stylesheet" href="style.css"/><script defer="defer" src="dist/index.js"></script></head><body><header class="pattern-header"><span class="pattern-badge">Structural</span><h1 class="pattern-title">Facade Pattern</h1><p class="pattern-desc">Provide a simplified interface to a complex subsystem</p></header><div class="pattern-flow"><div class="flow-col subsystem"><span class="flow-axis-label">Subsystem</span><div class="flow-node sm">Add</div><div class="flow-node sm">Subtract</div><div class="flow-node sm">Multiply</div><div class="flow-node sm">Divide</div></div><div class="flow-arrow-col"><div class="bridge-arrow">←</div><span class="bridge-label">hidden from client</span></div><div class="flow-node highlight facade-node">CalculatorFacade<br/><span>simplified API</span></div><div class="flow-arrow">← client calls</div><div class="flow-node">Calculator UI<br/><span>Client</span></div></div><div class="app-body"><div class="window one panel"><div class="screen calculator card"><div class="card-header"><h3>Calculator</h3><span class="facade-tag">via CalculatorFacade</span></div><div class="calculator input-group"><div class="form-field"><label for="num1">Number 1</label> <input id="num1" name="num1" placeholder="0"/></div><div class="form-field"><label for="num2">Number 2</label> <input id="num2" name="num2" placeholder="0"/></div></div><div class="calculator button-group"><button id="calculator_add" class="op-btn add">+ Add</button> <button id="calculator_subtract" class="op-btn sub">− Subtract</button> <button id="calculator_multiply" class="op-btn mul">× Multiply</button> <button id="calculator_divide" class="op-btn div">÷ Divide</button></div><div class="calculator total result-display"></div></div></div><div class="window two panel"><div class="screen tax card"><div class="card-header"><h3>Tax Calculator</h3><span class="facade-tag">via CalculatorFacade</span></div><form onsubmit="calculateTax()"><div class="form-field"><label for="product-price">Product Price</label> <input id="product-price" name="product-price" placeholder="e.g. 100"/></div><div class="form-field"><label for="tax-location">Tax Region</label> <select id="tax-location" name="location"><option value="">Select region…</option><option value="america">America</option><option value="europe">Europe</option></select></div><button id="tax_calculate" class="btn-primary">Calculate Tax</button></form><div class="tax output result-display"></div></div></div></div></body></html>
