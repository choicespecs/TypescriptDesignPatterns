<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Bridge Pattern</title><link rel="stylesheet" href="style.css"/><script defer="defer" src="dist/index.js"></script></head><body><header class="pattern-header"><span class="pattern-badge">Structural</span><h1 class="pattern-title">Bridge Pattern</h1><p class="pattern-desc">Decouple an abstraction from its implementation — change either side independently</p></header><div class="pattern-flow"><div class="flow-col"><span class="flow-axis-label">Abstraction</span><div class="flow-node">📧 Email</div><div class="flow-node">💬 SMS</div></div><div class="flow-bridge"><div class="bridge-line"></div><div class="flow-node highlight">NotificationBridge<br/><span>composes both</span></div><div class="bridge-line"></div></div><div class="flow-col"><span class="flow-axis-label">Implementation</span><div class="flow-node">🔔 Toast</div><div class="flow-node">🪟 Modal</div></div></div><section><div class="card"><h3 class="card-title">Compose Notification</h3><div class="form-field"><label for="message">Message</label> <input id="message" placeholder="Enter your message…"/></div><div class="option-group"><span class="option-label">Notification Type <span id="notification-type" class="selected-tag"></span></span><div class="notify-window btn-group"><button id="email-button" class="opt-btn">📧 Email</button> <button id="sms-button" class="opt-btn">💬 SMS</button></div></div><div class="option-group"><span class="option-label">Display Method <span id="display-type" class="selected-tag"></span></span><div class="display-notify-window btn-group"><button id="toast-button" class="opt-btn">🔔 Toast</button> <button id="modal-button" class="opt-btn">🪟 Modal</button></div></div><div class="action-row"><button id="create-message" class="btn-primary">Send &amp; Display</button> <button id="reset" class="btn-reset" style="display:none">↺ Reset</button></div><div id="send-log" class="send-log hidden"></div></div></section><div id="modal-overlay" class="modal-overlay hidden"><div class="modal-window"><div class="modal-header" id="modal-header"><div class="modal-title-row"><span class="modal-channel-icon"></span> <span class="modal-channel-title"></span></div><button class="modal-close" id="modal-close-btn">&times;</button></div><div class="modal-meta" id="modal-meta"></div><div class="modal-body" id="modal-message"></div></div></div><div class="toast-container"></div></body></html>
