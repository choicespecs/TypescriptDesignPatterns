name: Deploy Hub to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache Hub's node_modules — patterns each have their own lock file so
      # caching them would need a matrix; skip for simplicity.
      - name: Cache Hub node_modules
        uses: actions/cache@v4
        with:
          path: Hub/node_modules
          key: hub-${{ hashFiles('Hub/package-lock.json') }}
          restore-keys: hub-

      # Build every pattern that has a package.json.
      # Adapter is skipped — it has no package.json or built HTML.
      - name: Build patterns
        run: |
          for dir in Behavioral/*/ Creational/*/ Structural/*/; do
            [ -f "$dir/package.json" ] || continue
            echo "Building $dir"
            (cd "$dir" && npm ci && npm run build)
          done

      - name: Build Hub
        run: cd Hub && npm ci && npm run build

      # Assemble _site/ layout:
      #   _site/index.html          ← Hub
      #   _site/dist/index.js       ← Hub bundle
      #   _site/<Category>/<Pattern>/index.html
      #   _site/<Category>/<Pattern>/style.css
      #   _site/<Category>/<Pattern>/dist/index.js
      - name: Assemble site
        run: |
          mkdir -p _site/dist

          # Hub files
          cp Hub/index.html _site/index.html
          cp Hub/dist/index.js _site/dist/index.js

          # Pattern files
          for dir in Behavioral/*/ Creational/*/ Structural/*/; do
            [ -f "${dir}index.html" ]      || continue
            [ -f "${dir}dist/index.js" ]   || continue
            mkdir -p "_site/${dir}dist"
            cp "${dir}index.html"    "_site/${dir}index.html"
            cp "${dir}style.css"     "_site/${dir}style.css"
            cp "${dir}dist/index.js" "_site/${dir}dist/index.js"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
