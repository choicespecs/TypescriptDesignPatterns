<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>State Pattern</title><link rel="stylesheet" href="style.css"/><script defer="defer" src="dist/index.js"></script></head><body><header class="pattern-header"><span class="pattern-badge">Behavioral</span><h1 class="pattern-title">State Pattern</h1><p class="pattern-desc">An object changes its behavior when its internal state changes — as if it became a different class</p></header><div class="pattern-flow"><div class="flow-node state-red">Red<br/><span>balance &lt; 0</span></div><div class="flow-arrow">⇄</div><div class="flow-node state-silver highlight">Silver<br/><span>0 – 1000</span></div><div class="flow-arrow">⇄</div><div class="flow-node state-gold">Gold<br/><span>balance &gt; 1000</span></div></div><div class="screen"><div class="account-header"><div class="account-info"><span class="account-label">Account Holder</span><h2 class="user-name">User</h2></div><div class="balance-display"><span class="balance-label">Balance</span> <span class="balance-amount">$<span class="balance">0</span></span></div></div><div class="content-row"><div class="forms-card card"><h3 class="card-title">Transactions</h3><form class="deposit-form" onsubmit="deposit_account()"><div class="form-field"><label for="deposit">Deposit Amount</label> <input id="deposit" name="deposit" type="number" min="0" placeholder="0"/></div><button type="submit" class="btn-deposit">↑ Deposit</button></form><form class="withdraw-form" onsubmit="withdraw_account()"><div class="form-field"><label for="withdraw">Withdraw Amount</label> <input id="withdraw" name="withdraw" type="number" min="0" placeholder="0"/></div><button type="submit" class="btn-withdraw">↓ Withdraw</button></form></div><div class="status-card card"><h3 class="card-title">Account Status</h3><div class="status-display"><div class="status-name"><span class="status-pill"><span class="bank-status-title"></span></span></div><p class="status-info"></p></div></div></div></div></body></html>
