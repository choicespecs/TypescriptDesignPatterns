<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Iterator Pattern</title><link rel="stylesheet" href="style.css"/><script defer="defer" src="dist/index.js"></script></head><body><header class="pattern-header"><span class="pattern-badge">Behavioral</span><h1 class="pattern-title">Iterator Pattern</h1><p class="pattern-desc">Traverse a collection sequentially without exposing its internal structure</p></header><div class="pattern-flow"><div class="flow-node">LRUCache<br/><span>Collection</span></div><div class="flow-arrow">→</div><div class="flow-node highlight">LRUconcreteIterator<br/><span>Iterator</span></div><div class="flow-arrow">→</div><div class="flow-node">LRULinkedList<br/><span>Internal Structure</span></div></div><div class="input-screen"><div class="window"><form class="lru-capacity setup-form"><h3 class="setup-title">Configure LRU Cache</h3><div class="form-field"><label for="capacity">Cache Capacity</label> <input name="capacity" placeholder="e.g. 4"/></div><button type="submit" class="btn-primary">Initialize Cache</button></form><div class="visual-linked-list"><div class="cache-stats"><div class="stat-pill mru"><span class="stat-label">MRU</span><span class="current-mru">—</span></div><div class="stat-pill info"><span class="stat-label">Last Get</span><span class="current-get-lru">—</span></div><div class="stat-pill lru"><span class="stat-label">LRU</span><span class="current-lru">—</span></div></div><div class="info-screen cache-info"></div><div class="linked-list-wrapper"><div class="linked-list"></div></div><div class="cache-controls"><form class="lru-add-form inline-form"><span class="form-label">Add</span> <input class="lru-key" name="lru-key" placeholder="key"/> <input class="lru-value" name="lru-value" placeholder="value"/> <button type="submit" class="btn-primary btn-sm">Put</button></form><form class="lru-get-form inline-form"><span class="form-label">Get</span> <input class="lru-get-key" name="lru-get-key" placeholder="key"/> <button type="submit" class="btn-primary btn-sm">Get</button></form></div><div class="buttons-location"><button class="print btn-secondary">Print Cache (Iterator)</button></div></div></div></div></body></html>
