<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Command Pattern</title><link rel="stylesheet" href="style.css"/></head><body><header class="pattern-header"><span class="pattern-badge">Behavioral</span><h1 class="pattern-title">Command Pattern</h1><p class="pattern-desc">Operations are encapsulated as objects — enabling undo, history, and queuing</p></header><div class="pattern-flow"><div class="flow-node role">Invoker<br/><span>DatabaseApplication</span></div><div class="flow-arrow">→</div><div class="flow-node role highlight">Command<br/><span>InsertDatabase</span></div><div class="flow-arrow">→</div><div class="flow-node role">Receiver<br/><span>ApplicationDatabase</span></div></div><div class="app-layout"><div class="panel database-panel"><div class="panel-header"><span class="panel-icon">🗄</span><h3>Database</h3></div><div class="db-columns"><div class="db-col"><h4>User Name</h4><ul class="username-list"></ul></div><div class="db-col"><h4>Information</h4><ul class="information-list"></ul></div></div></div><div class="panel commands-panel"><div class="commands-nav"><button class="undo-btn btn-danger">↩ Undo</button></div><div class="panel-body"><form><div class="form-row"><div class="form-field"><label>Username</label> <input name="username" placeholder="Enter username"/></div><div class="form-field"><label>Information</label> <input placeholder="Enter info"/></div></div><button type="submit" class="btn-primary">Insert Record</button></form><div class="history-section"><h4>Command History</h4><ul class="actions"></ul></div></div></div></div></body></html>
