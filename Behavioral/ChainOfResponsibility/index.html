<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Chain of Responsibility Pattern</title><link rel="stylesheet" href="style.css"/><script defer="defer" src="dist/index.js"></script></head><body><header class="pattern-header"><span class="pattern-badge">Behavioral</span><h1 class="pattern-title">Chain of Responsibility</h1><p class="pattern-desc">Each handler validates one rule and passes to the next — or rejects early</p></header><div class="pattern-flow"><div class="flow-node">Required<br/>Field</div><div class="flow-arrow">→</div><div class="flow-node">Username<br/>Format</div><div class="flow-arrow">→</div><div class="flow-node">Email<br/>Format</div><div class="flow-arrow">→</div><div class="flow-node">Password<br/>Format</div></div><main class="demo"><div class="card"><h2 class="card-title">Login Form</h2><form id="validationForm"><div class="form-field"><label for="username">Username <span class="hint">alphanumeric only</span></label> <input id="username" placeholder="e.g. john42"/></div><div class="form-field"><label for="email">Email</label> <input type="email" id="email" placeholder="user@example.com"/></div><div class="form-field"><label for="password">Password <span class="hint">8+ chars, upper, lower, digit</span></label> <input type="password" id="password" placeholder="••••••••"/></div><button type="submit" class="btn-primary">Submit</button><div id="validation-result" class="validation-result"></div></form></div></main></body></html>
