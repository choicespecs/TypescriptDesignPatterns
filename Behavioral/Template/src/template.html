<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Template Method Pattern</title><link rel="stylesheet" href="style.css"/></head><body><header class="pattern-header"><span class="pattern-badge">Behavioral</span><h1 class="pattern-title">Template Method Pattern</h1><p class="pattern-desc">Define the algorithm skeleton in a base class — subclasses fill in the steps</p></header><div class="pattern-flow"><div class="flow-node">log()<br/><span>template method</span></div><div class="flow-arrow">→</div><div class="flow-node highlight">notify()<br/><span>abstract hook</span></div><div class="flow-arrow">→</div><div class="flow-node">saveLog()<br/><span>base impl</span></div><div class="flow-arrow">→</div><div class="flow-node">highTierNotify()<br/><span>optional hook</span></div></div><div class="window-rows"><div class="panel card"><div class="panel-header"><span class="panel-dot log-dot"></span><h2>Log Output</h2><span class="panel-hint">saveLog() appends here</span></div><ul class="log"></ul></div><div class="panel card"><div class="panel-header"><span class="panel-dot app-dot"></span><h2>Application</h2><span class="panel-hint">counting to 10</span></div><ul class="application-run"></ul></div></div></body></html>
