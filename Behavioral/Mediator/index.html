<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Mediator Pattern</title><link rel="stylesheet" href="style.css"/><script defer="defer" src="dist/index.js"></script></head><body><header class="pattern-header"><span class="pattern-badge">Behavioral</span><h1 class="pattern-title">Mediator Pattern</h1><p class="pattern-desc">Components communicate through a central mediator — never directly with each other</p></header><div class="pattern-flow"><div class="flow-node">UserComponent<br/><span>Alice</span></div><div class="flow-arrow">→</div><div class="flow-node highlight">ChatRoom<br/><span>Mediator</span></div><div class="flow-arrow">→</div><div class="flow-node">UserComponent<br/><span>Bob</span></div></div><main class="demo"><div id="chat-window-1" class="chat-window"><div class="chat-header"><span class="user-avatar">A</span><div><h3>Alice</h3><span class="user-role">UserComponent</span></div></div><div class="chat-message"></div><div class="chat-input" id="chat-input-1"><input id="message-input-1" placeholder="Type a message…"/> <button class="send-button btn-primary" id="send-button-1">Send</button></div><div class="user-list" id="user-list-1"></div></div><div class="mediator-indicator"><div class="mediator-box"><span class="mediator-label">ChatRoom</span> <span class="mediator-sublabel">Mediator</span></div><div class="mediator-lines"><div class="line"></div><div class="line"></div></div></div><div id="chat-window-2" class="chat-window"><div class="chat-header"><span class="user-avatar bob">B</span><div><h3>Bob</h3><span class="user-role">UserComponent</span></div></div><div class="chat-message"></div><div class="chat-input" id="chat-input-2"><input id="message-input-2" placeholder="Type a message…"/> <button class="send-button btn-primary" id="send-button-2">Send</button></div><div class="user-list" id="user-list-2"></div></div></main></body></html>
