<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Memento Pattern</title><link rel="stylesheet" href="style.css"/></head><body><header class="pattern-header"><span class="pattern-badge">Behavioral</span><h1 class="pattern-title">Memento Pattern</h1><p class="pattern-desc">Save and restore an object's state without exposing its internal structure</p></header><div class="pattern-flow"><div class="flow-node">RichTextEditor<br/><span>Originator</span></div><div class="flow-arrow">→</div><div class="flow-node highlight">EditorMemento<br/><span>Memento (snapshot)</span></div><div class="flow-arrow">→</div><div class="flow-node">UndoManager<br/><span>Caretaker</span></div></div><main class="demo"><div class="card"><div class="editor-header"><h2 class="card-title">Rich Text Editor</h2><button id="undoButton" class="btn-undo">↩ Undo</button></div><div id="editor" contenteditable="true" spellcheck="false" placeholder="Start typing… each keystroke saves a snapshot"></div><p class="editor-hint">State is saved on each input. Click Undo to restore the previous snapshot.</p></div></main></body></html>
