<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Builder Pattern</title><link rel="stylesheet" href="style.css"/></head><body><header class="pattern-header"><span class="pattern-badge">Creational</span><h1 class="pattern-title">Builder Pattern</h1><p class="pattern-desc">Construct complex objects step by step using a fluent interface</p></header><div class="pattern-flow"><div class="flow-node">WidgetBuilder<br/><span>.setTitle().setColor()…</span></div><div class="flow-arrow">→ .build() →</div><div class="flow-node highlight">Widget<br/><span>Product</span></div><div class="flow-arrow">→ addWidget() →</div><div class="flow-node">DashboardBuilder<br/><span>Director</span></div></div><div class="window"><div class="section-container"><div class="section builder-section"><div class="section-title-row"><h3 class="section-heading">Configure Widget</h3><div class="error-display alert-error">All fields must be filled out</div><div class="success-display alert-success">Widget added!</div></div><form id="widget-creator" class="form-item" onsubmit="myFunction()"><div class="form-inputs"><div class="form-field"><label for="title">Title</label> <input name="title" placeholder="Widget title"/></div><div class="form-field"><label for="content">Content</label> <input name="content" placeholder="Widget content"/></div><div class="form-row-2"><div class="form-field"><label for="font">Font Family</label> <select id="font" name="font"><option value="">Select…</option><option value="Andale Mono">Andale Mono</option><option value="sans-serif">Sans Serif</option><option value="monospace">Monospace</option><option value="cursive">Cursive</option></select></div><div class="form-field"><label for="size">Height (px)</label> <input type="number" name="size" min="100" max="1000" placeholder="100–1000"/></div></div><div class="form-row-2"><div class="form-field"><label for="color">Background</label> <select id="color" name="color"><option value="">Select…</option><option value="white">White</option><option value="beige">Beige</option><option value="lightgrey">Light Grey</option><option value="lightblue">Light Blue</option></select></div><div class="form-field"><label for="font-color">Font Color</label> <select id="font-color" name="font-color"><option value="">Select…</option><option value="black">Black</option><option value="navy">Navy</option><option value="red">Red</option></select></div></div><div class="form-field"><span class="radio-group-label">Text Align</span><div class="radio-buttons"><label class="radio-label"><input type="radio" name="text_align" value="left"/> Left</label> <label class="radio-label"><input type="radio" name="text_align" value="center"/> Center</label> <label class="radio-label"><input type="radio" name="text_align" value="right"/> Right</label></div></div></div><button type="submit" class="btn-primary">Add Widget to Dashboard</button></form></div><div class="section dashboard-section"><div class="section-title-row"><h3 class="section-heading">Dashboard</h3></div><div id="dashboard"></div></div></div></div></body></html>
