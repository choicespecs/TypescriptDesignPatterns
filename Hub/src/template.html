<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TypeScript Design Patterns</title>
  </head>
  <body>
    <div id="app">
      <header class="site-header">
        <div class="header-inner">
          <div class="header-title">
            <span class="header-ts">TS</span>
            <h1>Design Patterns</h1>
          </div>
          <p class="header-sub">21 patterns &mdash; Behavioral &middot; Creational &middot; Structural</p>
          <div class="search-wrap">
            <input
              type="text"
              id="search"
              placeholder="Search patterns..."
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>
      </header>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">
          All <span class="count">21</span>
        </button>
        <button class="filter-btn" data-filter="behavioral">
          Behavioral <span class="count">10</span>
        </button>
        <button class="filter-btn" data-filter="creational">
          Creational <span class="count">4</span>
        </button>
        <button class="filter-btn" data-filter="structural">
          Structural <span class="count">7</span>
        </button>
      </div>

      <main id="grid" class="pattern-grid"></main>

      <p id="no-results" class="no-results hidden">No patterns match your search.</p>
    </div>

    <!-- Pattern detail modal -->
    <div id="overlay" class="overlay hidden" aria-modal="true" role="dialog">
      <div class="modal">

        <div class="modal-header">
          <div class="modal-title-row">
            <h2 id="modal-name"></h2>
            <span id="modal-badge" class="category-badge"></span>
          </div>
          <div class="modal-tabs">
            <button class="modal-tab active" data-tab="demo" id="tab-demo">Live Demo</button>
            <button class="modal-tab" data-tab="docs" id="tab-docs">Documentation</button>
          </div>
          <button id="modal-close" aria-label="Close">&times;</button>
        </div>

        <!-- Demo panel -->
        <div id="panel-demo" class="tab-panel">
          <div id="demo-loading" class="demo-loading">Loading demo&hellip;</div>
          <iframe
            id="demo-frame"
            title="Pattern demo"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
          ></iframe>
        </div>

        <!-- Docs panel -->
        <div id="panel-docs" class="tab-panel hidden">
          <div id="modal-body" class="modal-body markdown-body"></div>
        </div>

      </div>
    </div>
  </body>
</html>
