<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decorator Pattern | Example</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./dist/decoratorPattern.js" defer></script>
</head>
<body>
    <section>
        <div class="window screen">
            <h1>Weapons</h1>
            <img src="./weapon.png" alt="">
            <div class="weapon-stat">
                <h3>Stats:</h3>
                <ul>
                    <li class="weapon-dmg">Damage</li>
                    <li class="weapon-mod">Modifier</li>
                    <li class="weapon-special">Special</li>
                </ul>
            </div>
        </div>
        <div class="menu screen"></div>
    </section>
</body>
</html>
