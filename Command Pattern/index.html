<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Pattern</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./dist/commandPattern.js" defer></script>
</head>
<body>
    <div class="window">
        <div class="database">
            <div class="col one">
                <h1>User Name</h1>
                <ul>
                    <li></li>
                </ul>
            </div>
            <div class="col two">
                <h1>Information</h1>
                <ul>
                    <li></li>
                </ul>
            </div>
        </div>
        <div class="commands">
            <form action="">
                <div class="form-wrapper">
                    <div class="label-wrapper">
                        <label for="username">Username:</label>
                        <label for="info" name="information">Information:</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="text" name="username">
                        <input type="text">
                    </div>
                </div>
                <div class="button-holder">
                    <button>Undo</button>
                    <button>Submit</button>
                </div>
            </form>
            <button>Demo</button>
            <div class="commands-window">
                <h2>Actions</h2>
                <ul>
                    <li>Hello</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
